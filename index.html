<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[新式]気象警報ビューアーv1.1.11</title>
<style>
body {
  font-family: "Yu Gothic", "YuGothic", "メイリオ", sans-serif;
  white-space: pre-wrap;
  margin: 5px;
  padding: 5px;
  background: #fff;
  font-size: 14px;
  line-height: 1.4;
}
#eew {
  margin: 0;
  padding: 0;
  font-family: "Yu Gothic", "YuGothic", "メイリオ", sans-serif;
  white-space: pre-wrap;
  word-break: break-all;
  overflow-wrap: anywhere;
}
#copyBtn {
  font-size: 12px;
  padding: 2px 5px;
  margin-bottom: 0;
  cursor: pointer;
}
#areaSelect {
  font-size: 12px;
  padding: 10px 10px;
  margin-bottom: 0;
  cursor: pointer;
}
.hidden {
  display: none;
}
</style>
</head>
<body>
<div id="updateTime">取得日時: ----/--/-- --:--:--</div>
<button id="copyBtn">&nbsp;<br>　　　本文をコピー　　　<br>&nbsp;</button>
<select id="areaSelect"></select>

<label><input type="radio" name="mode" value="all"> 全情報</label>
<label><input type="radio" name="mode" value="keihou" checked> 警報以上</label>
<label><input type="radio" name="mode" value="kiken_keihou"> 危険警報以上</label>

<pre id="eew">読み込み中...</pre>

<script>
const JMA_BASE = "https://www.jma.go.jp/bosai";
const AREA_JSON_URL = `${JMA_BASE}/common/const/area.json`;
const WARNING_R8_URL = `${JMA_BASE}/warning/data/r8`;

const warnArea = {
  "00": {name: "解除", level: null},
  "02": {name: "暴風雪警報", level: 3},
  "03": {name: "レベル３大雨警報", level: 3},
  "05": {name: "暴風警報", level: 3},
  "06": {name: "大雪警報", level: 3},
  "07": {name: "波浪警報", level: 3},
  "08": {name: "レベル３高潮警報", level: 3},
  "09": {name: "レベル３土砂災害警報", level: 3},
  "10": {name: "レベル２大雨注意報", level: 2},
  "12": {name: "大雪注意報", level: 2},
  "13": {name: "風雪注意報", level: 2},
  "14": {name: "雷注意報", level: 2},
  "15": {name: "強風注意報", level: 2},
  "16": {name: "波浪注意報", level: 2},
  "17": {name: "融雪注意報", level: 2},
  "19": {name: "レベル２高潮注意報", level: 2},
  "20": {name: "濃霧注意報", level: 2},
  "21": {name: "乾燥注意報", level: 2},
  "22": {name: "なだれ注意報", level: 2},
  "23": {name: "低温注意報", level: 2},
  "24": {name: "霜注意報", level: 2},
  "25": {name: "着氷注意報", level: 2},
  "26": {name: "着雪注意報", level: 2},
  "27": {name: "その他の注意報", level: 2},
  "29": {name: "レベル２土砂災害注意報", level: 2},
  "32": {name: "暴風雪特別警報", level: 5},
  "33": {name: "レベル５大雨特別警報", level: 5},
  "35": {name: "暴風特別警報", level: 5},
  "36": {name: "大雪特別警報", level: 5},
  "37": {name: "波浪特別警報", level: 5},
  "38": {name: "レベル５高潮特別警報", level: 5},
  "39": {name: "レベル５土砂災害特別警報", level: 5},
  "43": {name: "レベル４大雨危険警報", level: 4},
  "48": {name: "レベル４高潮危険警報", level: 4},
  "49": {name: "レベル４土砂災害危険警報", level: 4}
};

const regionCodes = {
  "石狩・空知・後志地方": ["016000"], "宗谷地方": ["011000"], "上川・留萌地方": ["012000"],
  "網走・北見・紋別地方": ["013000"], "十勝地方": ["014030"], "釧路・根室地方": ["014100"],
  "胆振・日高地方": ["015000"], "渡島・檜山地方": ["017000"], "青森県": ["020000"],
  "岩手県": ["030000"], "宮城県": ["040000"], "秋田県": ["050000"], "山形県": ["060000"],
  "福島県": ["070000"], "茨城県": ["080000"], "栃木県": ["090000"], "群馬県": ["100000"],
  "埼玉県": ["110000"], "千葉県": ["120000"], "東京都": ["130000"], "神奈川県": ["140000"],
  "山梨県": ["190000"], "長野県": ["200000"], "岐阜県": ["210000"], "静岡県": ["220000"],
  "愛知県": ["230000"], "三重県": ["240000"], "新潟県": ["150000"], "富山県": ["160000"],
  "石川県": ["170000"], "福井県": ["180000"], "滋賀県": ["250000"], "京都府": ["260000"],
  "大阪府": ["270000"], "兵庫県": ["280000"], "奈良県": ["290000"], "和歌山県": ["300000"],
  "鳥取県": ["310000"], "島根県": ["320000"], "岡山県": ["330000"], "広島県": ["340000"],
  "山口県": ["350000"], "徳島県": ["360000"], "香川県": ["370000"], "愛媛県": ["380000"],
  "高知県": ["390000"], "福岡県": ["400000"], "佐賀県": ["410000"], "長崎県": ["420000"],
  "熊本県": ["430000"], "大分県": ["440000"], "宮崎県": ["450000"],
  "鹿児島県（奄美地方を除く）": ["460100"], "奄美地方（鹿児島県）": ["460040"],
  "沖縄本島地方": ["471000"], "大東島地方": ["472000"], "宮古島地方": ["473000"],
  "八重山地方": ["474000"]
};

const areaGroups = [
  ["北海道地方", ["石狩・空知・後志地方", "宗谷地方", "上川・留萌地方", "網走・北見・紋別地方", "十勝地方", "釧路・根室地方", "胆振・日高地方", "渡島・檜山地方"]],
  ["東北地方", ["青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県"]],
  ["関東甲信地方", ["茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県", "山梨県", "長野県"]],
  ["東海地方", ["岐阜県", "静岡県", "愛知県", "三重県"]],
  ["北陸地方", ["新潟県", "富山県", "石川県", "福井県"]],
  ["近畿地方", ["滋賀県", "京都府", "大阪府", "兵庫県", "奈良県", "和歌山県"]],
  ["中国地方", ["鳥取県", "島根県", "岡山県", "広島県", "山口県"]],
  ["四国地方", ["徳島県", "香川県", "愛媛県", "高知県"]],
  ["九州北部地方（山口県を含む）", ["山口県", "福岡県", "佐賀県", "長崎県", "熊本県", "大分県"]],
  ["九州南部・奄美地方", ["宮崎県", "鹿児島県（奄美地方を除く）", "奄美地方（鹿児島県）"]],
  ["沖縄地方", ["沖縄本島地方", "大東島地方", "宮古島地方", "八重山地方"]]
];

let areaDataCache = null;
let updateSerial = 0;

function setNowTime() {
  const now = new Date();
  const YYYY = now.getFullYear();
  const MM = String(now.getMonth() + 1).padStart(2, "0");
  const dd = String(now.getDate()).padStart(2, "0");
  const HH = String(now.getHours()).padStart(2, "0");
  const mm = String(now.getMinutes()).padStart(2, "0");
  const ss = String(now.getSeconds()).padStart(2, "0");
  document.getElementById("updateTime").textContent = `取得日時: ${YYYY}/${MM}/${dd} ${HH}:${mm}:${ss}`;
}

function buildAreaSelect() {
  const select = document.getElementById("areaSelect");
  select.textContent = "";
  const national = document.createElement("option");
  national.textContent = "全国";
  national.selected = true;
  select.appendChild(national);

  for (const [label, areas] of areaGroups) {
    const optgroup = document.createElement("optgroup");
    optgroup.label = label;
    for (const area of areas) {
      const option = document.createElement("option");
      option.textContent = area;
      optgroup.appendChild(option);
    }
    select.appendChild(optgroup);
  }
}

async function fetchJson(url) {
  const res = await fetch(url, {cache: "no-store"});
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${url}`);
  return res.json();
}

async function getAreaData() {
  if (!areaDataCache) areaDataCache = await fetchJson(AREA_JSON_URL);
  return areaDataCache;
}

function allRegionCodes() {
  return [...new Set(Object.values(regionCodes).flat())];
}

function targetRegionCodes(areaName) {
  if (areaName === "全国") return allRegionCodes();
  return regionCodes[areaName] || [];
}

async function getCityWarningsByArea(taishoChiiki = "全国") {
  const areaData = await getAreaData();
  const codes = targetRegionCodes(taishoChiiki);
  if (codes.length === 0) throw new Error(`未対応の地域です: ${taishoChiiki}`);

  const warnInfo = Object.fromEntries(Object.values(warnArea).map(info => [info.name, {}]));
  let reportDatetime = "";
  let regionReportDT = "";

  const responses = await Promise.all(codes.map(async code => {
    try {
      return [code, await fetchJson(`${WARNING_R8_URL}/${code}.json`)];
    } catch (e) {
      return [code, e];
    }
  }));

  for (const [regionCode, payload] of responses) {
    if (payload instanceof Error) continue;
    const largeAreaName = Object.entries(regionCodes).find(([, list]) => list.includes(regionCode))?.[0] || regionCode;

    for (const report of payload) {
      if (!report || !report.warning) continue;
      if (!reportDatetime || report.reportDatetime > reportDatetime) reportDatetime = report.reportDatetime;
      if (taishoChiiki !== "全国" && (!regionReportDT || report.reportDatetime > regionReportDT)) {
        regionReportDT = report.reportDatetime;
      }

      for (const item of report.warning.class20Items || []) {
        const cityInfo = areaData.class20s?.[item.areaCode];
        const cityName = cityInfo?.name || item.areaCode;

        for (const kind of item.kinds || []) {
          if (!kind.code || kind.status === "解除") continue;
          const info = warnArea[kind.code];
          if (!info || !info.name) continue;

          if (!warnInfo[info.name][largeAreaName]) warnInfo[info.name][largeAreaName] = [];
          if (!warnInfo[info.name][largeAreaName].includes(cityName)) {
            warnInfo[info.name][largeAreaName].push(cityName);
          }
        }
      }
    }
  }

  return {warnData: {reportDatetime, warnInfo}, regionReportDT};
}

async function main(mode = 3, taishoChiiki = "全国") {
  const serial = ++updateSerial;
  try {
    setNowTime();
    document.getElementById("eew").textContent = "読み込み中...";
    const {warnData, regionReportDT} = await getCityWarningsByArea(taishoChiiki);
    if (serial !== updateSerial) return;

    const dt = new Date(regionReportDT || warnData.reportDatetime || Date.now());
    const MM = String(dt.getMonth() + 1).padStart(2, "0");
    const dd = String(dt.getDate()).padStart(2, "0");
    const HH = String(dt.getHours()).padStart(2, "0");
    const mm = String(dt.getMinutes()).padStart(2, "0");

    let titleKind = "";
    if (mode === 2) titleKind = "気象警報・注意報";
    else if (mode === 3) titleKind = "気象警報";
    else if (mode === 4) titleKind = "気象危険/特別警報";

    const titleArea1 = taishoChiiki === "全国" ? "全国の" : "";
    const titleArea2 = taishoChiiki === "全国" ? "" : `\n${taishoChiiki}`;
    let text = `《${titleArea1}${titleKind}》${titleArea2}\n${MM}月${dd}日${HH}時${mm}分`;
    text += regionReportDT ? " 発表" : " 更新";

    let count = 0;
    for (const [code, info] of Object.entries(warnArea)) {
      if (!info.level || info.level < mode) continue;
      const areas = warnData.warnInfo[info.name] || {};
      const areaNames = Object.keys(areas).filter(name => taishoChiiki === "全国" || name === taishoChiiki);
      if (areaNames.length === 0) continue;

      text += `\n\n${getWarnColor(info.level)}${info.name}${getWarnColor(info.level)}`;
      count++;
      for (const areaName of areaNames) {
        const cities = areas[areaName];
        if (!cities || cities.length === 0) continue;
        text += `\n【${areaName}】\n${cities.join("　")}`;
      }
    }

    if (count === 0) {
      if (mode === 2) text += "\n\n発表中の気象警報・注意報等はありません。";
      else if (mode === 3) text += "\n\n発表中の気象警報はありません。";
      else if (mode === 4) text += "\n\n発表中の危険警報・特別警報はありません。";
    }

    document.getElementById("eew").textContent = text.trim();
  } catch (e) {
    if (serial !== updateSerial) return;
    document.getElementById("eew").textContent = `ERROR\n${e.message || e}`;
  }
}

function getWarnColor(level) {
  switch (level) {
    case 2: return "🟨";
    case 3: return "🟥";
    case 4: return "🟪";
    case 5: return "⬛️";
    default: return "◆";
  }
}

function update() {
  const value = document.querySelector('input[name="mode"]:checked').value;
  const mode = value === "all" ? 2 : value === "keihou" ? 3 : 4;
  const area = document.getElementById("areaSelect").selectedOptions[0].textContent.trim();
  main(mode, area);
}

document.getElementById("copyBtn").addEventListener("click", async () => {
  const text = document.getElementById("eew").textContent;
  try {
    await navigator.clipboard.writeText(text);
    alert("コピー完了");
  } catch(e) {
    alert(`ERROR\n${e}`);
  }
});

document.querySelectorAll('input[name="mode"]').forEach(radio => {
  radio.addEventListener("change", update);
});
document.getElementById("areaSelect").addEventListener("change", update);

window.addEventListener("load", () => {
  buildAreaSelect();
  update();
});
</script>
</body>
</html>

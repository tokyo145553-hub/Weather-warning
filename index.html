let areaDataCache = null;

/* =========================
   ★地図部分だけ最低限修正
   ========================= */

async function getGeoJsonFeatures() {
  if (!geoJsonFeatureCache) {
    const results = await Promise.all(
      GEOJSON_INDEXES.map(async index => {
        try {
          const res = await fetch(`${GEOJSON_BASE_URL}/class20s_${index}.json`, {cache:"force-cache"});
          if (!res.ok) return [];
          const json = await res.json();
          return json.features || [];
        } catch (e) {
          return [];
        }
      })
    );
    geoJsonFeatureCache = results.flat();
  }
  return geoJsonFeatureCache;
}

async function renderWarningMap(mapInfo, taisho_chiiki) {
  const svg = document.getElementById("warningMap");
  const note = document.getElementById("mapNote");
  const title = document.getElementById("mapTitle");

  svg.innerHTML = "";
  title.textContent = `地図表示: ${taisho_chiiki}`;
  note.textContent = "地図を描画中...";

  try {
    const features = await getGeoJsonFeatures();

    if (!features || features.length === 0) {
      note.textContent = "地図データなし";
      return;
    }

    const width = svg.clientWidth || 600;
    const height = svg.clientHeight || 400;

    svg.setAttribute("viewBox", `0 0 ${width} ${height}`);

    const layer = document.createElementNS("http://www.w3.org/2000/svg", "g");
    svg.appendChild(layer);

    for (const feature of features) {
      if (!feature.geometry) continue;

      const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

      let d = "";

      const polys = feature.geometry.coordinates;
      for (const poly of polys) {
        for (const ring of poly) {
          ring.forEach((p, i) => {
            const x = (p[0] + 180) * (width / 360);
            const y = (90 - p[1]) * (height / 180);
            d += (i === 0 ? "M" : "L") + x + "," + y;
          });
          d += "Z";
        }
      }

      path.setAttribute("d", d);
      path.setAttribute("fill", "#eee");
      path.setAttribute("stroke", "#666");
      path.setAttribute("stroke-width", "0.3");

      layer.appendChild(path);
    }

    note.textContent = "地図表示完了";

  } catch (e) {
    note.textContent = "地図エラー: " + e.message;
  }
}

function setNowTime() {
  const now = new Date();
  const YYYY = now.getFullYear();
  const MM = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const HH = String(now.getHours()).padStart(2, '0');
  const mm = String(now.getMinutes()).padStart(2, '0');
  const ss = String(now.getSeconds()).padStart(2, '0');

  document.getElementById("updateTime").textContent =
    `取得日時: ${YYYY}/${MM}/${dd} ${HH}:${mm}:${ss}`;
}

function update() {
  setNowTime();
  const value = document.querySelector('input[name="mode"]:checked').value;
  let mode;
  if (value === "all") mode = 2;
  else if (value === "keihou") mode = 3;

  const statusFormat = document.getElementById("statusFormat").checked;

}
